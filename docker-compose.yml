networks:
  gestpg-internal:
    name: gestpg-internal
  # Rede onde os containers Postgres GERENCIADOS (criados via UI) são conectados.
  # Declarada aqui pra existir antes do backend subir; o backend também checa/cria
  # via Docker API (internal/docker Client.EnsureNetwork) então isso é redundante
  # de propósito — só evita corrida na primeira subida do stack.
  gestpg-managed:
    name: gestpg-managed

volumes:
  metadata_db_data:
  # Arquivos de backup (pg_dump) quando o storage escolhido é "local" — fica
  # num volume nomeado, não bind mount, pelo mesmo motivo dos volumes dos
  # servidores gerenciados (sobrevive a recriação do container do backend).
  backups_data:
  # Snapshots .tar.gz de volume genérico (aba Docker > Volumes > Backup) —
  # mesmo raciocínio dos outros: volume nomeado, nunca bind mount do host.
  generic_backups_data:
  # Arquivos de docker-compose.yml/Dockerfile enviados pela tela de "Docker"
  # (deploy via compose, build via Dockerfile) — mesmo raciocínio dos outros
  # dois volumes acima, sobrevive a recriação do container do backend.
  stacks_data:
  # Compartilhado entre backend (escreve) e Traefik (lê via file provider) —
  # nome fixo (não prefixado pelo projeto do compose) pelo mesmo motivo das
  # redes gestpg-*: o backend cria o container do Traefik via Docker API
  # direto, então precisa saber o nome exato do volume sem depender de como
  # o compose prefixaria por padrão.
  traefik_dynamic_data:
    name: gestpg-traefik-dynamic
  # Só o Traefik usa — certificados do Let's Encrypt (acme.json).
  traefik_letsencrypt_data:
    name: gestpg-traefik-letsencrypt

services:
  metadata-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${METADATA_DB_USER}
      POSTGRES_PASSWORD: ${METADATA_DB_PASSWORD}
      POSTGRES_DB: ${METADATA_DB_NAME}
    volumes:
      - metadata_db_data:/var/lib/postgresql/data
    networks: [gestpg-internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${METADATA_DB_USER} -d ${METADATA_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Único ponto de contato com o Docker Engine. O backend NUNCA monta o socket
  # direto — só esse proxy, com as chamadas de API restritas ao mínimo necessário
  # pra criar/start/stop/inspect containers, volumes e redes.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
      POST: 1
      INFO: 1
      SYSTEM: 1
      # BUILD: pra `docker build`/`docker compose up --build` funcionarem
      # (tela de Docker: build via Dockerfile).
      BUILD: 1
      # EXEC: liga o terminal web dentro de containers (aba Docker > detalhe
      # do container). Decisão consciente, pedida explicitamente — antes
      # ficava desligada de propósito ("nunca dá shell dentro de container
      # gerenciado"). Aumenta a superfície de ataque: quem alcança a UI
      # autenticada consegue rodar qualquer comando dentro de qualquer
      # container do host. Mitigado por exigir sessão autenticada em toda a
      # API (ver internal/auth) — antes dessa mudança a API inteira era
      # aberta sem login nenhum.
      EXEC: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [gestpg-internal]

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      HTTP_ADDR: ":8080"
      METADATA_DATABASE_URL: postgres://${METADATA_DB_USER}:${METADATA_DB_PASSWORD}@metadata-db:5432/${METADATA_DB_NAME}?sslmode=disable
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      MANAGED_NETWORK_NAME: gestpg-managed
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY}
    ports:
      - "8080:8080"
    volumes:
      # Só pra medir disco real do host via statfs (dashboard) — não a raiz
      # inteira, só /etc (mesmo filesystem que / em qualquer droplet de disco
      # único, sem expor o resto da árvore do host pra dentro do container).
      - /etc:/hostfs:ro
      # Raiz do gerenciador de arquivos do host (aba "Arquivos do host") —
      # read-write de propósito, mas NUNCA a raiz inteira do filesystem:
      # HOST_FILES_ROOT é uma pasta configurável (default /srv/gestpg-files),
      # única fronteira alcançável de dentro do container. Diferente do mount
      # de /etc acima (read-only, só pra medir disco via statfs).
      - ${HOST_FILES_ROOT:-/srv/gestpg-files}:/hostfiles
      - backups_data:/backups
      - generic_backups_data:/generic-backups
      - stacks_data:/stacks
      - traefik_dynamic_data:/traefik-dynamic
      # firewall-agent roda no HOST via systemd (ver setup.sh), nunca em
      # container — ufw mexe no namespace de rede do host. Esse socket
      # precisa já existir (agente já rodando) ANTES desse `up`, senão o
      # Docker cria um diretório vazio no lugar em vez de repassar o socket.
      - /run/gestpg-firewall.sock:/run/gestpg-firewall.sock
    depends_on:
      metadata-db:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
    networks: [gestpg-internal, gestpg-managed]

  frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_* é embutido no bundle JS em build time (roda no navegador
        # do usuário), por isso precisa ser a URL pública da API, não o nome do
        # serviço Docker interno.
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
    restart: unless-stopped
    environment:
      # 4173 em vez do 3000 default do Next.js — 3000 colide com um monte de
      # outra coisa (React dev server, Grafana, etc) rodando no mesmo host.
      PORT: "4173"
    ports:
      - "4173:4173"
    depends_on:
      - backend
    networks: [gestpg-internal]
